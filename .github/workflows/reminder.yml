name: Run WhatsApp Reminder

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:        # Allows you to trigger it manually from the Actions tab

jobs:
  run-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests pytz; fi

      - name: Run script
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: python wa_reminder.py
